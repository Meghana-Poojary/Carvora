services:
  - type: web
    name: carvora-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --max-requests 1 --keep-alive 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HF_TOKEN
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /health
    
  - type: static
    name: carvora-client
    rootDir: client
    staticPublishPath: dist
    buildCommand: npm install && npm run build
    envVars:
      - key: VITE_API_URL
        value: https://carvora-api.onrender.com
